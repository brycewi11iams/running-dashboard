name: Coros Daily Sync

on:
  schedule:
    # 6:00 AM Central Time = 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch: # allow manual runs

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Coros data
        env:
          COROS_EMAIL: ${{ secrets.COROS_EMAIL }}
          COROS_PASSWORD: ${{ secrets.COROS_PASSWORD }}
        run: python scripts/fetch_coros.py

      - name: Commit and push daily.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Coros sync $(date -u '+%Y-%m-%d')"
            git push
          fi
